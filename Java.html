<!DOCTYPE html>
<html>
<head>
    <title>Prompt and Alert Example</title>
    <script>
        function getInput() {
            var userInput = prompt("Enter your name:");
            alert("You entered: " + userInput);
        }
    </script>
</head>
<body>

    <h2>Prompt and Alert Example</h2>
    <button onclick="getInput()">Click Here</button>

</body>
</html>
